<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dart4fun Competitions</title>
    <script>
      // Early Error Handler & On-Screen Console
      window.__logs = [];
      function renderLogs() {
        var d = document.getElementById('debug-console');
        if (!d) {
          d = document.createElement('div');
          d.id = 'debug-console';
          d.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#0f0;z-index:99999;padding:1rem;overflow:auto;font-family:monospace;font-size:12px;';
          if (document.body) document.body.appendChild(d);
          else document.write(d.outerHTML);
          d = document.getElementById('debug-console');
        }
        if (d) {
          d.innerHTML = '<h3>TV Debug Console</h3><button onclick="location.reload()" style="padding:10px;margin-bottom:10px;">RELOAD</button><br>' + window.__logs.join('<br><hr>');
        }
      }
      
      function logToScreen(type, args) {
        try {
          var msg = Array.prototype.slice.call(args).map(function(a) {
            if (typeof a === 'object') return JSON.stringify(a);
            return String(a);
          }).join(' ');
          window.__logs.push('<b>[' + type + ']</b> ' + msg);
          if (type === 'ERROR' || type === 'EXCEPTION') renderLogs();
        } catch(e) {}
      }

      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var stack = (error && error.stack) ? error.stack : '';
        logToScreen('EXCEPTION', [msg, url + ':' + lineNo, stack]);
        return false;
      };

      var oldLog = console.log;
      var oldErr = console.error;
      var oldWarn = console.warn;
      
      console.log = function() { logToScreen('LOG', arguments); oldLog.apply(console, arguments); };
      console.error = function() { logToScreen('ERROR', arguments); oldErr.apply(console, arguments); };
      console.warn = function() { logToScreen('WARN', arguments); oldWarn.apply(console, arguments); };

      // Polyfills
      if (!Object.assign) {
        Object.assign = function(t) {
          for (var i = 1; i < arguments.length; i++) {
            var s = arguments[i];
            for (var k in s) { if (Object.prototype.hasOwnProperty.call(s, k)) t[k] = s[k]; }
          }
          return t;
        };
      }
      if (!window.Promise) {
        document.write('<script src="https://cdn.jsdelivr.net/npm/es6-promise@4/dist/es6-promise.auto.min.js"><\/script>');
      }
    </script>

    
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin id="vite-legacy-polyfill" src="/dart4fun_competitions/assets/polyfills-legacy-BVgwi0xt.js"></script>
    <script crossorigin id="vite-legacy-entry" data-src="/dart4fun_competitions/assets/index-legacy-TPsUiphb.js">System.import(document.getElementById('vite-legacy-entry').getAttribute('data-src'))</script>
  </body>
</html>
